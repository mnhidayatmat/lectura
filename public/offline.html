<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — Lectura</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; background: #f8fafc; color: #334155;
            padding: 1rem;
        }
        .container { text-align: center; max-width: 400px; }
        .icon { width: 80px; height: 80px; margin: 0 auto 1.5rem; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        p { color: #64748b; margin-bottom: 1.5rem; line-height: 1.6; }
        button {
            background: #4F46E5; color: white; border: none; border-radius: 0.5rem;
            padding: 0.75rem 1.5rem; font-size: 1rem; font-weight: 600; cursor: pointer;
        }
        button:active { background: #4338CA; }
    </style>
</head>
<body>
    <div class="container">
        <img class="icon" src="/icons/icon-192x192.png" alt="Lectura">
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Please check your connection and try again.</p>
        <button onclick="window.location.reload()">Try Again</button>
    </div>
</body>
</html>
