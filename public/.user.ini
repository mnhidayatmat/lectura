; Per-directory PHP overrides for FastCGI / PHP-FPM hosts.
; Manual score entry submits the whole class's marks plus attached
; answer-script PDFs in a single request, so we need generous limits.
upload_max_filesize = 64M
post_max_size = 128M
memory_limit = 256M
max_file_uploads = 200
max_input_vars = 5000
